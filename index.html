<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LarvaAI | Lightning-fast</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488' },
                        dark: { 800: '#111827', 900: '#030712', 950: '#02040a' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }

        .msg-enter { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .glow-effect { box-shadow: 0 0 15px rgba(45, 212, 191, 0.3); transition: box-shadow 0.3s ease; }
        .glow-effect:focus-within { box-shadow: 0 0 25px rgba(45, 212, 191, 0.6); }

        .dot-flashing {
            position: relative; width: 8px; height: 8px; border-radius: 5px;
            background-color: #2dd4bf; animation: dot-flashing 1s infinite linear alternate; animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: ''; display: inline-block; position: absolute; top: 0; width: 8px; height: 8px;
            border-radius: 5px; background-color: #2dd4bf; animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before { left: -12px; animation-delay: 0s; }
        .dot-flashing::after { left: 12px; animation-delay: 1s; }

        @keyframes dot-flashing {
            0% { background-color: #2dd4bf; transform: translateY(0); }
            50%, 100% { background-color: rgba(45, 212, 191, 0.2); transform: translateY(3px); }
        }
        
        .prose pre { background-color: #111827 !important; border: 1px solid #1f2937; }
        .prose code { color: #5eead4 !important; }
    </style>
</head>
<body class="bg-dark-950 text-gray-200 h-[100dvh] w-full flex flex-col overflow-hidden selection:bg-brand-500/30">

    <header class="bg-dark-900/80 backdrop-blur-xl border-b border-white/5 p-4 flex items-center justify-between z-20">
        <div class="flex items-center gap-4">
            <div class="w-11 h-11 rounded-2xl bg-gradient-to-tr from-brand-600 to-brand-400 flex items-center justify-center shadow-[0_0_15px_rgba(45,212,191,0.4)]">
                <i class="fa-solid fa-bolt-lightning text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-semibold text-white tracking-wide">LarvaAI</h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <span class="w-2 h-2 rounded-full bg-brand-400 animate-pulse"></span>
                    <p class="text-xs text-brand-400 font-medium tracking-wider uppercase">Larva3.9 Lightning-fast</p>
                </div>
            </div>
        </div>
        <div>
            <a href="https://github.com/zephyr-bt" target="_blank" class="text-gray-500 hover:text-white transition-colors p-2"><i class="fa-brands fa-github text-2xl"></i></a>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-8 scroll-smooth pb-10">
        <div class="flex w-full space-x-4 max-w-4xl mx-auto msg-enter">
            <div class="flex-shrink-0 h-10 w-10 rounded-xl bg-gradient-to-tr from-brand-600 to-brand-400 flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-bolt-lightning text-white text-sm"></i>
            </div>
            <div class="max-w-[85%]">
                <div class="bg-dark-800/80 backdrop-blur-sm p-5 rounded-2xl rounded-tl-none border border-white/5 shadow-xl prose prose-invert prose-brand max-w-none">
                    <p>System initialized. I am <strong>LarvaAI</strong>, operating securely via Vercel Edge functions. How can I accelerate your workflow today?</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-dark-950 border-t border-white/5 z-20 w-full shrink-0">
        <div class="max-w-4xl mx-auto">
            <form id="chat-form" class="relative flex items-center bg-dark-900 rounded-2xl border border-white/10 overflow-hidden glow-effect">
                <input 
                    type="text" 
                    id="user-input" 
                    class="flex-1 bg-transparent border-none px-6 py-5 text-white focus:outline-none placeholder-gray-600 text-lg" 
                    placeholder="Message LarvaAI..." 
                    autocomplete="off"
                    required
                >
                <button type="submit" id="send-btn" class="px-6 py-5 bg-transparent text-brand-500 hover:text-brand-400 hover:bg-white/5 transition-all disabled:opacity-50 border-l border-white/5">
                    <i class="fa-solid fa-paper-plane text-xl"></i>
                </button>
            </form>
            <p class="text-center text-[10px] text-gray-600 mt-3 font-mono">Powered by Groq API • Secured by Vercel</p>
        </div>
    </footer>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat-container');
        const sendBtn = document.getElementById('send-btn');

        marked.setOptions({ breaks: true, gfm: true });

        let messageHistory = [
            { 
                role: "system", 
                content: "You are LarvaAI. You are powered by an advanced model known as Larva3.9 Lightning-fast. You provide highly intelligent, concise, and sleek responses. Always format code blocks and lists properly." 
            }
        ];

        function createMessageElement(content, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full space-x-4 max-w-4xl mx-auto msg-enter ${isUser ? 'justify-end' : ''}`;
            
            const avatarHtml = isUser 
                ? `<div class="flex-shrink-0 h-10 w-10 rounded-xl bg-gray-800 flex items-center justify-center order-2 ml-4 border border-white/10"><i class="fa-solid fa-user text-gray-400 text-sm"></i></div>`
                : `<div class="flex-shrink-0 h-10 w-10 rounded-xl bg-gradient-to-tr from-brand-600 to-brand-400 flex items-center justify-center shadow-lg"><i class="fa-solid fa-bolt-lightning text-white text-sm"></i></div>`;

            const displayContent = isUser ? content.replace(/</g, "&lt;").replace(/>/g, "&gt;") : marked.parse(content);

            const messageHtml = `
                <div class="${isUser ? 'order-1' : ''} max-w-[85%]">
                    <div class="${isUser ? 'bg-brand-600 text-white' : 'bg-dark-800/80 backdrop-blur-sm border border-white/5 prose prose-invert prose-brand max-w-none'} p-5 rounded-2xl ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'} shadow-xl">
                        ${isUser ? `<p class="whitespace-pre-wrap text-lg">${displayContent}</p>` : displayContent}
                    </div>
                </div>
            `;

            wrapper.innerHTML = isUser ? messageHtml + avatarHtml : avatarHtml + messageHtml;
            return wrapper;
        }

        function createTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = `flex w-full space-x-4 max-w-4xl mx-auto msg-enter`;
            wrapper.innerHTML = `
                <div class="flex-shrink-0 h-10 w-10 rounded-xl bg-gradient-to-tr from-brand-600 to-brand-400 flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-bolt-lightning text-white text-sm"></i>
                </div>
                <div class="max-w-[85%]">
                    <div class="bg-dark-800/80 backdrop-blur-sm p-6 rounded-2xl rounded-tl-none border border-white/5 shadow-xl flex items-center justify-center h-full min-w-[80px]">
                        <div class="dot-flashing ml-3"></div>
                    </div>
                </div>
            `;
            return wrapper;
        }

        async function fetchAIResponse() {
            try {
                // We now call our OWN secure Vercel backend, not Groq directly!
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messageHistory })
                });

                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error || 'Server Error');
                
                return data.choices[0].message.content;
            } catch (error) {
                console.error('API Error:', error);
                return "**Connection Error:** I could not reach our secure backend. Please make sure you added the GROQ_API_KEY to Vercel Environment Variables.";
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            chatContainer.appendChild(createMessageElement(text, true));
            messageHistory.push({ role: "user", content: text });
            userInput.value = '';
            
            requestAnimationFrame(() => chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }));

            const typingIndicator = createTypingIndicator();
            chatContainer.appendChild(typingIndicator);
            requestAnimationFrame(() => chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }));

            userInput.disabled = true;
            sendBtn.disabled = true;

            const aiResponseText = await fetchAIResponse();

            typingIndicator.remove();
            chatContainer.appendChild(createMessageElement(aiResponseText, false));
            messageHistory.push({ role: "assistant", content: aiResponseText });

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
            
            requestAnimationFrame(() => chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }));
        });
    </script>
</body>
</html>
